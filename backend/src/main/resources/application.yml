spring:
  application:
    name: trafficlab
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${TRAFFICLAB_DB_HOST:localhost}:${TRAFFICLAB_DB_PORT:5432}/${TRAFFICLAB_DB_NAME:trafficlab}}
    username: ${SPRING_DATASOURCE_USERNAME:${TRAFFICLAB_DB_USER:trafficlab}}
    password: ${SPRING_DATASOURCE_PASSWORD:${TRAFFICLAB_DB_PASSWORD:trafficlab}}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: ${PORT:${SERVER_PORT:8080}}

trafficlab:
  cors:
    allowed-origins: ${TRAFFICLAB_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
